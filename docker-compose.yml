# Local full-stack run: API + dashboard.
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # set ANTHROPIC_API_KEY in a .env file to enable real classification
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/app/data:ro

  dashboard:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -p 3000 -H 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    volumes:
      - ./dashboard:/app
    depends_on:
      - api
